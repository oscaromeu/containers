---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: App Builder

on:
  workflow_call:
    inputs:
      app:
        type: string
        description: App Name
        required: true
      release:
        type: boolean
        description: Release
        required: true

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      app-exists: ${{ steps.app-exists.outputs.exists }}
      platforms: ${{ steps.app-options.outputs.platforms }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check For Existing App
        uses: ./.github/actions/app-exists
        id: app-exists
        with:
          app: ${{ inputs.app }}

      - name: Get App Options
        uses: ./.github/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Get App Versions
        uses: ./.github/actions/app-versions
        id: app-versions
        with:
          upstream-version: ${{ steps.app-options.outputs.version }}

      - name: Build App Metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: meta
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          flavor: latest=false
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.app-versions.outputs.semantic }},enable=${{ steps.app-versions.outputs.is-valid-semver && inputs.release }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.app-versions.outputs.semantic }},enable=${{ steps.app-versions.outputs.is-valid-semver && inputs.release }}
            type=semver,pattern={{major}},value=${{ steps.app-versions.outputs.semantic }},enable=${{ steps.app-versions.outputs.is-valid-semver && inputs.release }}
            type=raw,value=${{ steps.app-versions.outputs.raw }},enable=${{ steps.app-versions.outputs.is-valid-semver && inputs.release }}
            type=raw,value=rolling,enable=${{ inputs.release }}
            type=raw,value=sandbox,enable=${{ ! inputs.release }}

      - name: Upload Bake Metadata
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ inputs.app }}-bake-metadata
          path: ${{ steps.meta.outputs.bake-file }}
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build (${{ matrix.platform }})
    needs:
      - plan
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.plan.outputs.platforms) }}
    runs-on: ${{ startsWith(matrix.platform, 'linux/arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Target Architecture
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: target
        with:
          script: |-
            core.setOutput('arch', '${{ matrix.platform }}'.split('/').pop());

      - name: Get App Options
        uses: ./.github/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download Bake Metadata
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.app }}-bake-metadata
          path: ${{ runner.temp }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Add Include Directory to Build Context
        run: |-
          rsync -a --ignore-existing --progress ./include/ ./apps/${{ inputs.app }}/

      - name: Build App
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6.10.0
        id: bake
        with:
          files: |
            ./docker-bake.hcl
            cwd://${{ runner.temp }}/docker-metadata-action-bake.json
          set: |
            *.args.VENDOR=${{ github.repository_owner }}
            *.cache-from=${{ format('type=registry,ref=ghcr.io/{0}/build_cache:{1}-{2},mode=max', github.repository_owner, inputs.app, steps.target.outputs.arch) }}
            *.cache-to=${{ inputs.release && format('type=registry,ref=ghcr.io/{0}/build_cache:{1}-{2},mode=max,compression=zstd,force-compression=true', github.repository_owner, inputs.app, steps.target.outputs.arch) || '' }}
            *.labels.org.opencontainers.image.title=${{ inputs.app }}
            *.labels.org.opencontainers.image.url=https://ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}
            *.labels.org.opencontainers.image.version=${{ steps.app-options.outputs.version }}
            *.labels.org.opencontainers.image.revision=${{ github.sha }}
            *.labels.org.opencontainers.image.vendor=${{ github.repository_owner }}
            *.output=type=image,name=ghcr.io/${{ github.repository_owner }}/${{ inputs.app }},push-by-digest=true,name-canonical=true,push=true,compression=zstd,force-compression=true
            *.platform=${{ matrix.platform }}
            *.tags=
          source: .
          targets: image
          workdir: ./apps/${{ inputs.app }}

      - name: Export Digest
        run: |-
          mkdir -p ${{ runner.temp }}/digests
          DIGEST="${{ fromJSON(steps.bake.outputs.metadata).image['containerimage.digest'] }}"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Upload Digest
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ inputs.app }}-digests-${{ steps.target.outputs.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge
    runs-on: ubuntu-latest
    needs:
      - build
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download Bake Metadata
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.app }}-bake-metadata
          path: ${{ runner.temp }}

      - name: Download Digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: ${{ inputs.app }}-digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Manifest List and Push
        working-directory: ${{ runner.temp }}/digests
        run: |-
          docker buildx imagetools create \
              $(jq --raw-output --compact-output '.target."docker-metadata-action".tags | map(select(startswith("ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}")) | "-t " + .) | join(" ")' ${{ runner.temp }}/docker-metadata-action-bake.json) \
              $(printf 'ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}@sha256:%s ' *)

      - name: Inspect Image
        run: |-
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}:$(jq --raw-output '.target."docker-metadata-action".args.DOCKER_META_VERSION' ${{ runner.temp }}/docker-metadata-action-bake.json)

      - name: Export Digest
        id: digest
        run: |-
          TAG=$(jq --raw-output '.target."docker-metadata-action".args.DOCKER_META_VERSION' ${{ runner.temp }}/docker-metadata-action-bake.json)
          DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}:${TAG} --format '{{ json . }}' | jq --raw-output '.manifest.digest')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

  attest:
    name: Attest
    needs:
      - merge
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Upload Dependency Snapshot
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0.22.2
        with:
          dependency-snapshot: true
          image: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}@${{ needs.merge.outputs.digest }}

      - name: Attestation
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          push-to-registry: true
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}
          subject-digest: ${{ needs.merge.outputs.digest }}

      - name: Verify Attestation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |-
          gh attestation verify --repo ${{ github.repository }} oci://ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}@${{ needs.merge.outputs.digest }}

  trivy-scan:
    name: Trivy Scan
    needs:
      - plan
      - merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ github.token }}
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}@${{ needs.merge.outputs.digest }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Check Outdated OS Packages
        id: outdated
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}@${{ needs.merge.outputs.digest }}
        run: |-
          # Currently only handles Debian/Ubuntu (apt). Alpine images report count=0.
          UPGRADABLE=$(docker run --rm --entrypoint="" "$IMAGE_REF" \
            sh -c 'command -v apt-get >/dev/null 2>&1 && apt-get update -qq 2>/dev/null && apt list --upgradable 2>/dev/null | grep -v "^Listing"' || true)

          if [ -z "$UPGRADABLE" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "table=" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(echo "$UPGRADABLE" | wc -l)
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
            {
              echo "table<<OUTDATED_EOF"
              echo "| Package | Current | Available |"
              echo "|---------|---------|-----------|"
              echo "$UPGRADABLE" | head -30 | while IFS= read -r line; do
                PKG=$(echo "$line" | cut -d/ -f1)
                AVAIL=$(echo "$line" | grep -oP '\S+(?= \[)' | head -1)
                CURR=$(echo "$line" | grep -oP '(?<=\[upgradable from: )[^\]]+')
                echo "| ${PKG} | ${CURR:-—} | ${AVAIL:-—} |"
              done
              if [ "$COUNT" -gt 30 ]; then
                echo ""
                echo "_...and $((COUNT - 30)) more_"
              fi
              echo "OUTDATED_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Check Base Image Version
        id: base-image
        run: |-
          if [ -f "apps/${{ inputs.app }}/docker-bake.hcl" ]; then
            VERSION=$(docker buildx bake --list type=variables,format=json --progress=quiet \
              -f "apps/${{ inputs.app }}/docker-bake.hcl" \
              | jq -r '.[] | select(.name == "VERSION") | .value')
            echo "current=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "current=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalize and Compare Results
        id: diff
        run: |-
          jq -S '[.Results[]? | .Vulnerabilities[]? | {id: .VulnerabilityID, sev: .Severity, pkg: .PkgName, installed: .InstalledVersion, fixed: .FixedVersion}] | sort_by(.id)' \
            trivy-results.json > trivy-normalized.json

          if [ -f "apps/${{ inputs.app }}/trivy.json" ]; then
            jq -S '[.Results[]? | .Vulnerabilities[]? | {id: .VulnerabilityID, sev: .Severity, pkg: .PkgName, installed: .InstalledVersion, fixed: .FixedVersion}] | sort_by(.id)' \
              "apps/${{ inputs.app }}/trivy.json" > trivy-old-normalized.json
            if diff -q trivy-normalized.json trivy-old-normalized.json > /dev/null 2>&1; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit Trivy Results
        if: steps.diff.outputs.changed == 'true' && inputs.release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          # Commits the new trivy.json back to the repo so the delta vs previous
          # scan is discoverable via `git log apps/<app>/trivy.json`.
          cp trivy-results.json "apps/${{ inputs.app }}/trivy.json"
          git config user.name "obocaman[bot]"
          git config user.email "166250793+obocaman[bot]@users.noreply.github.com"
          git add "apps/${{ inputs.app }}/trivy.json"
          git commit -m "chore(${{ inputs.app }}): update trivy scan results"
          git pull --rebase origin "${{ github.head_ref || github.ref_name }}"
          git push

      - name: Build Trivy Summary
        id: summary
        env:
          OUTDATED_COUNT: ${{ steps.outdated.outputs.count }}
          OUTDATED_TABLE: ${{ steps.outdated.outputs.table }}
          BASE_VERSION: ${{ steps.base-image.outputs.current }}
        run: |-
          RESULTS="trivy-results.json"

          VULN_BODY=$(jq -r '
            def vulns: [.Results[]? | .Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH")];
            def critical: [vulns[] | select(.Severity == "CRITICAL")];
            def high: [vulns[] | select(.Severity == "HIGH")];
            def row: "| " + .PkgName + " | " + .InstalledVersion + " | " + (.FixedVersion // "\u2014") + " | [" + .VulnerabilityID + "](" + .PrimaryURL + ") |";
            def table(sev): sev | if length == 0 then "" else
              "| Package | Installed | Fixed | CVE |\n|---------|-----------|-------|-----|\n" +
              ([sort_by(.PkgName)[] | row] | join("\n")) + "\n"
            end;

            if (vulns | length) == 0 then
              "No CRITICAL or HIGH vulnerabilities found.\n"
            else
              (if (critical | length) > 0 then
                "#### CRITICAL (" + (critical | length | tostring) + ")\n\n" + table(critical) + "\n"
              else "" end) +
              (if (high | length) > 0 then
                "#### HIGH (" + (high | length | tostring) + ")\n\n" + table(high) + "\n"
              else "" end)
            end
          ' "$RESULTS")

          {
            echo "body<<TRIVY_EOF"
            echo "### Security Report: \`${{ inputs.app }}\`"
            echo ""
            echo "**Base image version:** \`${BASE_VERSION}\`"
            echo ""
            echo "---"
            echo ""
            echo "#### Vulnerabilities"
            echo ""
            echo "$VULN_BODY"
            if [ "${OUTDATED_COUNT}" -gt 0 ]; then
              echo "---"
              echo ""
              echo "<details>"
              echo "<summary>Outdated OS Packages (${OUTDATED_COUNT})</summary>"
              echo ""
              echo "$OUTDATED_TABLE"
              echo ""
              echo "</details>"
            else
              echo "---"
              echo ""
              echo "All OS packages are up to date."
            fi
            echo "TRIVY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR Comment
        if: ${{ ! inputs.release }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: trivy-scan-${{ inputs.app }}
          message: ${{ steps.summary.outputs.body }}

  test:
    if: ${{ ! inputs.release }}
    name: Test
    needs:
      - merge
      - attest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Run App Tests
        uses: ./.github/actions/app-tests
        with:
          app: ${{ inputs.app }}
          image: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}@${{ needs.merge.outputs.digest }}
          token: ${{ github.token }}

      - name: Get App Size Diff
        uses: ./.github/actions/app-size-diff
        id: app-size-diff
        with:
          from-app: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}:rolling
          to-app: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}:sandbox

      - name: Post App Size Diff
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: app-size-diff-${{ inputs.app }}
          message: |
            ${{ steps.app-size-diff.outputs.size-diff-markdown }}

  announce:
    if: ${{ inputs.release && needs.plan.outputs.app-exists != 'true' }}
    name: Announce
    needs:
      - plan
      - attest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Get App Options
        uses: ./.github/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Get Release Tag
        uses: ./.github/actions/release-tag
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Create Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          body: |
            > [!NOTE]
            > A new app has been added.

            ## 📦 App

            **Name**: [${{ inputs.app }}](https://github.com/${{ github.repository }}/pkgs/container/${{ inputs.app }})
            **Source**: <${{ steps.app-options.outputs.source }}>
          tag: ${{ steps.release.outputs.tag }}
          token: ${{ steps.app-token.outputs.token }}
